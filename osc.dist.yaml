# OpenSmartCharge — example configuration
# Copy to osc.yaml and edit for your setup.
# osc.yaml is in .gitignore — it won't be committed.

site:
  name: "My Home"
  # port: 8080        # HTTP server port (default: 8080)

# MQTT broker connection.
# Required for the mqtt-circuit balancer and for Home Assistant integration.
# Run "docker compose up" to start a local Mosquitto instance.
mqtt:
  host: localhost
  port: 1883
  # user: ""
  # password: ""
  topicPrefix: osc          # all OSC topics will be under osc/...
  homeAssistantDiscovery: true   # auto-create HA entities via MQTT discovery

# Day-ahead tariff sources.
# Each gets a name so loadpoints can reference it.
tariffs:
  - name: home
    type: elprisetjustnu     # Swedish zones (SE1–SE4) via elprisetjustnu.se — free, no API key
    zone: SE4                # SE1 | SE2 | SE3 | SE4   (SEK/kWh, 15-minute resolution)
                             # Prices fetched at 13:15 Europe/Stockholm after Nordpool publishes.
                             # Health is 'degraded' between midnight and 13:15 until tomorrow lands.
                             # For the Baltics/Finland instead, use:  type: elering  zone: EE|FI|LV|LT
                             # For a fixed-price contract instead:    type: fixed    pricePerKWh: 1.5

# Electrical circuits / load balancers.
# One per main fuse group in your home.
balancers:
  - name: house-main
    type: mqtt-circuit       # splits this circuit across its loadpoints (the name is legacy —
                             # the balancer is a pure splitter; the meter lives on a meterReader)
    mainBreakerA: 25         # main fuse in amps (per phase) — the hard ceiling for this circuit
    phases: 3
    meterReader: house-phase # live household current comes from a meterReader (the meter SSoT);
                             # defined under meterReaders: below. Omit for a blind circuit.
    # Static time-of-day fallback, used ONLY when the meter is stale AND there's no load history
    # yet. Per-breaker; unset → the global smartCharging defaults (nightMarginA 3, daytimeFraction
    # 0.5). Raise nightMarginA on a shared/multi-charger circuit so the house keeps more headroom.
    # nightMarginA: 3        # night budget = mainBreakerA − this A
    # daytimeFraction: 0.5   # day budget   = mainBreakerA × this

# Vehicles (optional — enables SoC-aware departure planning).
# osc.yaml is gitignored — credentials stay on-device and are never logged.
# Recommended: chmod 600 osc.yaml
vehicles:
  - name: enyaq
    type: skoda
    username: you@example.com    # MySkoda account email  (sensitive)
    password: "your-password"    # MySkoda account password (sensitive)
    vin: TMBABCDEF12345678       # 17-char VIN (uppercase)
    # pollIntervalSec: 900       # poll interval; minimum 300 s (default: 900)
    # staleAfterSec: 7200        # health → degraded if no successful poll for this long

# Meter readers — the single source of truth for live household current, so a balancer can
# size charger output below the main fuse. A balancer points its meterReader: at one by name.
# The reader's health()/staleAfterSec is the ONE staleness authority: when it goes degraded,
# the circuit falls back down the ladder (historical → static-tod). Requires mqtt: above.
meterReaders:
  - name: house-phase
    type: mqtt-phase             # subscribes to house/i1_a, house/i2_a, house/i3_a — raw per-phase
    topicPrefix: house           # amps published by pulse_bridge.py or any DSMR/Modbus bridge
    staleAfterSec: 60            # health → degraded after this many seconds without a frame
  # For a Tibber Pulse speaking DSMR directly, use the richer reader instead of mqtt-phase:
  # - name: house-pulse
  #   type: tibber-pulse
  #   subTopic: pulse              # MQTT topic where Pulse publishes DSMR frames (default: pulse)
  #   republishPrefix: house       # optional: re-publish house/{power_w,i1_a,i2_a,i3_a} for dashboards
  #   staleAfterSec: 60

# OCPP chargers.
# Any OCPP 1.6J charger configured to connect to ws://<your-host>:8080/ocpp
chargers:
  - name: garage
    type: ocpp16
    stationId: MYCHARGER01   # must match the chargepoint identifier in your charger's settings
    maxA: 16                 # maximum current the charger may deliver — ceiling for smart/fast modes
    phases: 3                # physical phase count (default 3) — sent as numberPhases in the charging profile
    autoStartTransaction: true  # auto-send RemoteStartTransaction when a car plugs in (Preparing);
                                # default true — set false to require app/RFID start on the charger

# Loadpoints: the control unit that connects a charger to a circuit + pricing + vehicle.
# One loadpoint per charger. Multiple loadpoints can share a balancer.
loadpoints:
  - name: garage-loadpoint
    charger: garage
    vehicle: enyaq           # optional — remove this line to disable SoC integration
    tariff: home
    balancer: house-main
    defaultMode: smart       # disabled | smart | fast
    targetSoc: 80            # default charge target (%)
    # targetTime: "07:00"    # daily departure time (HH:MM, local time)
                             # smart mode will plan cheap-slot charging to hit targetSoc by this time
